name: Market Data Sync (Stock Radar)

on:
  schedule:
    # 台股交易時段 (台北時間 09:00-13:30) 對應 UTC 01:00-05:30
    # 開盤後每 30 分鐘更新一次，收盤後 14:00 最後校對
    - cron: '0,30 1-5 * * 1-5'
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # 允許從 GitHub 介面手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy firebase-admin
          
      - name: Fetch & Calculate Market Data
        run: |
          echo "=== 1/3 更新 TSMC 風險監控 ==="
          python scripts/update_full_risk.py
          echo ""
          echo "=== 2/3 更新持倉資料 ==="
          python scripts/update_portfolio.py
          echo ""
          echo "=== 3/3 掃描 TW50 機會 ==="
          python scripts/scan_tw50_opportunities.py
          
      - name: Sync to Firestore (Cloud)
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT != '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "=== 推送至 Firestore ==="
          python scripts/cloud_sync.py
